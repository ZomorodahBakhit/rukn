<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=1440, initial-scale=1"/>
  <title>Rukn — Forgot password</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Manrope:wght@400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="styles.css?v=6"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" data-screen-label="Forgot password"></div>

  <script src="api/client.js"></script>
  <script src="api/audio.js"></script>
  <!-- We reuse auth.jsx's vignette + field components, then mount our own screen. -->
  <script type="text/babel" src="auth.jsx" data-presets="react" data-screen="forgot"></script>
  <script type="text/babel" data-presets="react">
    // The auth.jsx file already rendered AuthScreen into #root.
    // Replace it with the forgot-password screen.
    function ForgotApp() {
      const [identifier, setIdentifier] = React.useState("");
      const [busy, setBusy]             = React.useState(false);
      const [done, setDone]             = React.useState(null); // { message, dev_reset_path? }
      const [err, setErr]               = React.useState("");

      React.useEffect(() => {
        document.documentElement.dir = "ltr";
        document.documentElement.lang = "en";
        document.documentElement.setAttribute("data-palette", "dusk");
      }, []);

      const submit = async (e) => {
        e.preventDefault();
        if (!identifier.trim()) return;
        setErr(""); setBusy(true);
        const r = await window.RuknAPI.forgot(identifier.trim());
        setBusy(false);
        if (r.data.ok) setDone(r.data);
        else setErr(r.data.error || "Could not start reset.");
      };

      return (
        <div className="auth-stage">
          <aside className="auth-left">
            <AuthVignette/>
            <div className="auth-left-overlay">
              <div className="brand brand-stacked">
                <span className="dot"/>
                <span className="mark">Rukn</span>
                <span className="mark-ar">رُكن</span>
              </div>
              <p className="auth-pullquote">
                <em>"Forgetting is the first step to remembering anew."</em>
                <span className="auth-pullquote-cite">— a stranger at the door</span>
              </p>
            </div>
          </aside>

          <main className="auth-right">
            <a href="Login.html" className="auth-back">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                <path d="m15 18-6-6 6-6"/>
              </svg>
              Back to log in
            </a>

            <div className="auth-card">
              <div className="auth-header">
                <h1 className="auth-title display">Reset your password.</h1>
                <p className="auth-sub">
                  Enter the email or username on your account and we'll send a one-time link.
                </p>
              </div>

              {done ? (
                <>
                  <div className="field-error" style={{
                      marginBottom: 14, padding: "12px 14px",
                      background: "rgba(196,145,86,0.08)",
                      border: "1px solid rgba(196,145,86,0.32)",
                      borderRadius: "var(--r-md)",
                      color: "var(--on-glass)"}}>
                    {done.message}
                  </div>
                  {done.dev_reset_path ? (
                    <div style={{
                        padding: "12px 14px",
                        background: "rgba(247,239,224,0.04)",
                        border: "1px dashed var(--glass-stroke-2)",
                        borderRadius: "var(--r-md)",
                        fontSize: 12.5, lineHeight: 1.55,
                        color: "var(--on-glass-dim)"}}>
                      <strong style={{color: "var(--sky-sun)"}}>Dev mode:</strong>{" "}
                      SMTP isn't configured, so use this reset link directly →{" "}
                      <a href={done.dev_reset_path} className="link-quiet"
                         style={{color: "var(--brass)", textDecoration: "underline"}}>
                        open reset page
                      </a>
                    </div>
                  ) : null}
                </>
              ) : (
                <form className="auth-form" onSubmit={submit}>
                  {err ? (
                    <div className="field-error" style={{
                        marginBottom: 4, padding: "10px 12px",
                        background: "rgba(220,100,80,0.10)",
                        border: "1px solid rgba(220,100,80,0.40)",
                        borderRadius: "var(--r-md)"}}>{err}</div>
                  ) : null}
                  <div className="field">
                    <label htmlFor="ident">Email or username</label>
                    <div className="field-control">
                      <input id="ident" type="text"
                             value={identifier}
                             onChange={(e) => setIdentifier(e.target.value)}
                             placeholder="you@example.com"
                             autoComplete="username"/>
                    </div>
                  </div>
                  <button type="submit" className="btn btn-primary btn-block"
                          disabled={busy || !identifier.trim()}>
                    {busy ? "Sending…" : "Send reset link"}
                  </button>
                </form>
              )}

              <div className="auth-switch">
                Remembered it?{" "}
                <a href="Login.html" className="link-quiet">Back to log in</a>
              </div>
            </div>
          </main>
        </div>
      );
    }

    // Re-mount onto the same root the auth.jsx file already used.
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ForgotApp/>);
  </script>
</body>
</html>
